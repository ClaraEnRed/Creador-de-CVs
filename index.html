<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clara en Red · Mi currículum</title>
<style>
  :root{ --azul:#1C435A; --dorado:#C4A03C; --crema:#F7F4EC; --gris:#5A6B74; --linea:#d7d2c4; }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#eee9dd;color:var(--azul);padding:18px 13px;font-size:17px;}
  .wrap{max-width:640px;margin:0 auto;}
  .cabecera{text-align:center;margin-bottom:14px;}
  .marca{font-size:12px;letter-spacing:2px;color:var(--dorado);font-weight:700;text-transform:uppercase;}
  h1.titulo{margin:4px 0 0;font-size:23px;}
  .sub{color:var(--gris);font-size:14.5px;margin-top:6px;line-height:1.4;}
  .barra{height:8px;background:var(--linea);border-radius:99px;margin-bottom:5px;}
  .barra>div{height:8px;background:var(--dorado);border-radius:99px;transition:width .3s;width:0;}
  .pasoNum{font-size:13px;color:var(--gris);margin-bottom:16px;text-align:center;}
  .tarjeta{background:#fff;border-radius:18px;padding:24px 22px 20px;box-shadow:0 4px 24px rgba(28,67,90,.08);}
  .pregunta{font-size:22px;font-weight:700;margin:0 0 6px;line-height:1.25;}
  .ayuda{color:var(--gris);font-size:15px;line-height:1.5;margin:0 0 18px;}
  .opcional{display:inline-block;background:var(--crema);color:var(--gris);font-size:12px;font-weight:600;padding:3px 9px;border-radius:99px;margin-left:4px;vertical-align:middle;border:1px solid #e7e1d2;}
  input,textarea{width:100%;padding:14px 15px;border-radius:12px;border:2px solid var(--linea);font-size:17px;font-family:inherit;color:var(--azul);outline:none;background:#fff;}
  input:focus,textarea:focus{border-color:var(--dorado);}
  textarea{resize:vertical;min-height:84px;line-height:1.5;}
  label.lab{display:block;font-weight:600;font-size:16px;margin:0 0 16px;}
  label.lab .t{display:block;margin-bottom:7px;}
  .ej{color:var(--gris);font-size:13.5px;font-weight:400;font-style:italic;margin-bottom:7px;display:block;}
  .opciones{display:flex;flex-direction:column;gap:11px;}
  .opcion{display:flex;align-items:center;gap:13px;background:var(--crema);border:2px solid #e7e1d2;border-radius:14px;padding:15px 16px;cursor:pointer;font-size:17px;font-weight:600;color:var(--azul);text-align:left;width:100%;}
  .opcion:hover{border-color:var(--dorado);}
  .opcion.on{background:var(--azul);color:#fff;border-color:var(--azul);}
  .opcion .mc{width:24px;height:24px;border-radius:50%;border:2px solid var(--linea);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .opcion.on .mc{background:var(--dorado);border-color:var(--dorado);color:var(--azul);}
  .chips{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{background:var(--crema);color:var(--azul);border:2px solid #e7e1d2;border-radius:99px;padding:11px 17px;cursor:pointer;font-size:16px;font-weight:600;}
  .chip.on{background:var(--azul);color:#fff;border-color:var(--azul);}
  .item{position:relative;background:var(--crema);border-radius:14px;padding:16px;margin-bottom:14px;border:2px solid #e7e1d2;}
  .item .quitar{display:block;width:100%;margin-top:12px;background:#fff;border:2px solid var(--linea);color:var(--gris);border-radius:10px;padding:9px;cursor:pointer;font-size:14px;font-weight:600;}
  .campo-mini{margin-bottom:11px;}
  .campo-mini:last-of-type{margin-bottom:0;}
  .campo-mini .t{font-weight:600;font-size:15px;margin-bottom:6px;display:block;}
  .add{background:#fff;border:2.5px dashed var(--dorado);color:var(--azul);border-radius:14px;padding:16px;cursor:pointer;font-size:17px;font-weight:700;width:100%;}
  .add-otro{margin-top:12px;}
  .add-otro input{margin-bottom:8px;}
  .add-otro button{background:var(--dorado);border:none;color:var(--azul);border-radius:10px;padding:12px;cursor:pointer;font-weight:700;font-size:15px;width:100%;}
  .nav{display:flex;gap:11px;margin-top:22px;}
  .btn{border-radius:14px;padding:16px;cursor:pointer;font-size:18px;font-weight:700;border:none;flex:1;}
  .btn:hover{filter:brightness(1.07);}
  .btn-prim{background:var(--azul);color:#fff;flex:2;}
  .btn-sec{background:#fff;border:2px solid var(--azul);color:var(--azul);}
  .btn-sec[disabled]{border-color:var(--linea);color:#bbb;cursor:default;}
  .btn-oro{background:var(--dorado);color:var(--azul);}
  .saltar{display:block;width:100%;text-align:center;background:none;border:none;color:var(--gris);text-decoration:underline;cursor:pointer;font-size:15px;margin-top:14px;}
  .guia-guardar{background:var(--crema);border:2px solid #e7e1d2;border-radius:14px;padding:16px 18px;margin-top:16px;}
  .guia-guardar h4{margin:0 0 10px;font-size:15px;color:var(--azul);}
  .guia-guardar ol{margin:0;padding-left:20px;color:var(--gris);font-size:14.5px;line-height:1.7;}
  .cv{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(28,67,90,.12);display:grid;grid-template-columns:35% 65%;}
  .cv aside{background:var(--azul);color:#fff;padding:30px 20px;}
  .cv .acc{width:50px;height:4px;background:var(--dorado);margin-bottom:22px;}
  .cv .sec{margin-bottom:22px;}
  .cv aside h3{font-size:11.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--dorado);margin:0 0 9px;}
  .cv .linea{font-size:13px;line-height:1.6;opacity:.95;word-break:break-word;}
  .cv main{padding:32px 28px;}
  .cv main h1{margin:0;font-size:27px;line-height:1.1;}
  .cv .tit{color:var(--dorado);font-weight:700;font-size:15px;margin-top:6px;}
  .cv .sm{margin-top:20px;}
  .cv .sm h2{font-size:12.5px;letter-spacing:1px;text-transform:uppercase;color:var(--azul);border-bottom:2px solid var(--dorado);padding-bottom:5px;margin-bottom:11px;}
  .cv .exp{margin-bottom:15px;}
  .cv .fila{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .cv .puesto{color:var(--azul);font-size:15px;font-weight:700;}
  .cv .fecha{color:var(--dorado);font-size:12.5px;font-weight:600;white-space:nowrap;}
  .cv .empresa{color:var(--gris);font-size:13.5px;font-style:italic;}
  .cv .tareas{margin:5px 0 0;color:var(--gris);font-size:14px;line-height:1.55;}
  .cv .perfil{margin:0;color:var(--gris);font-size:14.5px;line-height:1.6;}
  @media print{ .no-print{display:none !important;} body{background:#fff;padding:0;} .cv{box-shadow:none;border-radius:0;} }
  @media(max-width:560px){ .cv{grid-template-columns:1fr;} .cv aside{padding:24px 22px;} .cv main{padding:26px 22px;} }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const TOTAL=7;
const estado={ paso:0, d:{
  genero:null,
  nombre:"", ciudad:"", tel:"", email:"",
  trabajos:[],
  haCuidado:null, cuidadoQuien:"", cuidadoAnios:"", cuidadoComp:[],
  fortalezas:[], idiomas:[], estudios:[]
}};
const COMP_CUIDADO=["Organización","Paciencia","Resolver problemas","Tomar decisiones","Estar pendiente de todo","Tratar con médicos y trámites","Aguantar bajo presión","Gestionar emociones"];
const NIVELES=["Es mi idioma","Lo hablo muy bien","Me defiendo","Lo hablo un poco"];
 
// ----- género: g(femenino, masculino) -----
function esF(){ return estado.d.genero!=="hombre"; } // por defecto femenino
function g(fem,masc){ return esF()?fem:masc; }
 
function fortalezasLista(){
  return ["Trato con la gente","Limpieza y orden","Cocinar","Cuidar a personas","Atención al cliente","Trabajar en equipo","Organizar y planificar","Vender","Manejar caja","Conducir","Aprender rápido","Tener paciencia",g("Ser responsable","Ser responsable"),"No rendirse fácil"];
}
 
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function render(){ document.getElementById("app").innerHTML=vista(); enlazar(); window.scrollTo(0,0); }
function vista(){
  const p=estado.paso;
  if(p===TOTAL) return vistaCV();
  const prog=(p/TOTAL)*100;
  return `
  <div class="cabecera no-print">
    <div class="marca">Clara en Red</div>
    <h1 class="titulo">Vamos a hacer tu currículum</h1>
    <p class="sub">Unas preguntas sencillas. No hay respuestas malas y puedes saltar lo que quieras.</p>
  </div>
  <div class="no-print">
    <div class="barra"><div style="width:${prog}%"></div></div>
    <div class="pasoNum">${p+1} de ${TOTAL}</div>
  </div>
  <div class="tarjeta no-print">${contenido(p)}
    <div class="nav">
      <button class="btn btn-sec" id="atras" ${p===0?"disabled":""}>← Atrás</button>
      <button class="btn btn-prim" id="siguiente">${p===TOTAL-1?"Ver mi currículum":"Continuar →"}</button>
    </div>
  </div>`;
}
function contenido(p){
  const d=estado.d;
  if(p===0) return `
    <p class="pregunta">Antes de empezar...</p>
    <p class="ayuda">Para escribir bien tu currículum, dinos cómo prefieres que hablemos de ti.</p>
    <div class="opciones">
      ${uniGen("mujer","Soy mujer")}
      ${uniGen("hombre","Soy hombre")}
    </div>`;
  if(p===1) return `
    <p class="pregunta">¿Cómo te llamas?</p>
    <p class="ayuda">Escribe tu nombre y tus apellidos.</p>
    <input data-k="nombre" value="${esc(d.nombre)}" placeholder="${g("María López García","Juan López García")}" autofocus>`;
  if(p===2) return `
    <p class="pregunta">¿Cómo pueden llamarte?</p>
    <p class="ayuda">Para que una empresa pueda contactarte. Pon lo que tengas.</p>
    <label class="lab"><span class="t">Tu teléfono</span>
      <input data-k="tel" inputmode="tel" value="${esc(d.tel)}" placeholder="600 00 00 00"></label>
    <label class="lab"><span class="t">¿En qué ciudad o pueblo vives?</span>
      <input data-k="ciudad" value="${esc(d.ciudad)}" placeholder="Madrid"></label>
    <label class="lab"><span class="t">Tu correo <span class="opcional">si tienes</span></span>
      <input data-k="email" inputmode="email" value="${esc(d.email)}" placeholder="tunombre@gmail.com"></label>`;
  if(p===3) return `
    <p class="pregunta">¿Has trabajado de algo?</p>
    <p class="ayuda">Vale cualquier trabajo: por horas, sin contrato, ayudando a alguien... Añade los que tengas. Si todavía no has trabajado, salta este paso.</p>
    <div id="lista-trab">${d.trabajos.map((t,i)=>itemTrab(t,i)).join("")}</div>
    <button class="add" data-add="trabajos">+ Añadir un trabajo</button>
    ${d.trabajos.length===0?`<button class="saltar" id="saltar">Todavía no he trabajado, saltar →</button>`:""}`;
  if(p===4) return `
    <p class="pregunta">¿Has cuidado de alguien?</p>
    <p class="ayuda">Cuidar de tus hijos, tus padres o un familiar es un trabajo muy importante. Si lo has hecho, lo ponemos en tu currículum con todo su valor.</p>
    <div class="opciones" style="margin-bottom:${d.haCuidado===true?'18px':'0'}">
      ${uni("haCuidado",true,"Sí, he cuidado de alguien")}
      ${uni("haCuidado",false,"No")}
    </div>
    ${d.haCuidado===true?`
      <label class="lab"><span class="t">¿De quién cuidaste?</span>
        <span class="ej">Por ejemplo: de mi madre, de mis hijos pequeños</span>
        <input data-k="cuidadoQuien" value="${esc(d.cuidadoQuien)}" placeholder="De mi madre"></label>
      <label class="lab"><span class="t">¿Cuánto tiempo? <span class="opcional">si lo recuerdas</span></span>
        <span class="ej">Por ejemplo: 3 años, o de 2020 a 2023</span>
        <input data-k="cuidadoAnios" value="${esc(d.cuidadoAnios)}" placeholder="Unos 3 años"></label>
      <label class="lab" style="margin-bottom:8px"><span class="t">Cuidando, ¿qué aprendiste a hacer bien?</span>
        <span class="ej">Toca las que sean verdad para ti</span></label>
      <div class="chips">${COMP_CUIDADO.map(c=>chip("cuidadoComp",c)).join("")}</div>`:""}`;
  if(p===5) return `
    <p class="pregunta">${g("¿En qué eres buena?","¿En qué eres bueno?")}</p>
    <p class="ayuda">Toca todo lo que se te dé bien. Lo que para ti es normal, para una empresa vale mucho.</p>
    <div class="chips">${fortalezasLista().map(f=>chip("fortalezas",f)).join("")}</div>
    <div class="add-otro">
      <input id="nuevaFort" placeholder="¿Algo más? Escríbelo aquí">
      <button id="addFort">+ Añadir</button>
    </div>
    <label class="lab" style="margin:24px 0 12px"><span class="t">¿Qué idiomas hablas? <span class="opcional">opcional</span></span></label>
    <div id="lista-idi">${d.idiomas.map((x,i)=>itemIdi(x,i)).join("")}</div>
    <button class="add" data-add="idiomas">+ Añadir un idioma</button>`;
  if(p===6) return `
    <p class="pregunta">¿Has estudiado o hecho cursos? <span class="opcional">opcional</span></p>
    <p class="ayuda">Vale el colegio, un curso, un taller o los cursos de Clara en Red. Si no tienes, salta este paso.</p>
    <div id="lista-est">${d.estudios.map((e,i)=>itemEst(e,i)).join("")}</div>
    <button class="add" data-add="estudios">+ Añadir un estudio o curso</button>
    ${d.estudios.length===0?`<button class="saltar" id="saltar">No tengo, saltar →</button>`:""}`;
}
function uniGen(val,texto){ const on=estado.d.genero===val; return `<button class="opcion ${on?"on":""}" data-gen="${val}"><span class="mc">${on?"✓":""}</span><span>${texto}</span></button>`; }
function uni(k,val,texto){ const on=estado.d[k]===val; return `<button class="opcion ${on?"on":""}" data-uni="${k}" data-val="${val}"><span class="mc">${on?"✓":""}</span><span>${texto}</span></button>`; }
function chip(k,val){ const on=estado.d[k].includes(val); return `<button class="chip ${on?"on":""}" data-chip="${k}" data-val="${esc(val)}">${val}</button>`; }
function itemTrab(t,i){return `<div class="item">
  <div class="campo-mini"><span class="t">¿De qué trabajabas?</span>
    <input data-arr="trabajos" data-i="${i}" data-f="puesto" placeholder="${g("Limpiadora, camarera, dependienta...","Limpiador, camarero, dependiente...")}" value="${esc(t.puesto)}"></div>
  <div class="campo-mini"><span class="t">¿Dónde? <span class="opcional">si quieres</span></span>
    <input data-arr="trabajos" data-i="${i}" data-f="empresa" placeholder="Nombre del sitio o de la familia" value="${esc(t.empresa)}"></div>
  <div class="campo-mini"><span class="t">¿Cuándo? <span class="opcional">si lo recuerdas</span></span>
    <input data-arr="trabajos" data-i="${i}" data-f="fechas" placeholder="2019 a 2022, o 2 años" value="${esc(t.fechas)}"></div>
  <div class="campo-mini"><span class="t">¿Qué hacías ahí?</span>
    <textarea data-arr="trabajos" data-i="${i}" data-f="tareas" placeholder="Con tus palabras: limpiaba casas, atendía clientes, cocinaba...">${esc(t.tareas)}</textarea></div>
  <button class="quitar" data-del="trabajos" data-i="${i}">Quitar este trabajo</button></div>`;}
function itemEst(e,i){return `<div class="item">
  <div class="campo-mini"><span class="t">¿Qué estudiaste o qué curso hiciste?</span>
    <input data-arr="estudios" data-i="${i}" data-f="titulo" placeholder="Graduado escolar, curso de cocina..." value="${esc(e.titulo)}"></div>
  <div class="campo-mini"><span class="t">¿Dónde? <span class="opcional">si quieres</span></span>
    <input data-arr="estudios" data-i="${i}" data-f="centro" placeholder="Centro o academia" value="${esc(e.centro)}"></div>
  <div class="campo-mini"><span class="t">¿Qué año? <span class="opcional">si lo recuerdas</span></span>
    <input data-arr="estudios" data-i="${i}" data-f="anio" placeholder="2021" value="${esc(e.anio)}"></div>
  <button class="quitar" data-del="estudios" data-i="${i}">Quitar</button></div>`;}
function itemIdi(x,i){return `<div class="item">
  <div class="campo-mini"><span class="t">Idioma</span>
    <input data-arr="idiomas" data-i="${i}" data-f="idioma" placeholder="Español, árabe, inglés..." value="${esc(x.idioma)}"></div>
  <div class="campo-mini"><span class="t">¿Cuánto lo hablas?</span>
    <div class="opciones">${NIVELES.map(n=>`<button class="opcion ${x.nivel===n?"on":""}" data-idi="${i}" data-val="${esc(n)}"><span class="mc">${x.nivel===n?"✓":""}</span><span>${n}</span></button>`).join("")}</div></div>
  <button class="quitar" data-del="idiomas" data-i="${i}">Quitar idioma</button></div>`;}
function pick(arr,seed){ return arr[seed % arr.length]; }
function semilla(){ const s=estado.d.nombre||""; let n=0; for(let i=0;i<s.length;i++) n+=s.charCodeAt(i); return n; }
function listar(arr){ arr=arr.filter(Boolean); if(arr.length===0) return ""; if(arr.length===1) return arr[0]; if(arr.length===2) return arr[0]+" y "+arr[1]; return arr.slice(0,-1).join(", ")+" y "+arr[arr.length-1]; }
function mayus(s){return s? s.charAt(0).toUpperCase()+s.slice(1):s;}
function frasePunto(s){ s=(s||"").trim(); if(!s) return ""; if(!/[.!?]$/.test(s)) s+="."; return mayus(s); }
function redactarPerfil(){
  const d=estado.d, sd=semilla();
  const f=d.fortalezas.map(x=>x.toLowerCase());
  let frases=[];
  if(d.trabajos.length){
    const puestos=[...new Set(d.trabajos.map(t=>t.puesto).filter(Boolean).map(x=>x.toLowerCase()))];
    if(puestos.length){
      frases.push(pick([
        "Tengo experiencia trabajando como "+listar(puestos)+".",
        "He trabajado como "+listar(puestos)+", y eso me ha dado oficio y soltura.",
        "Mi experiencia laboral es como "+listar(puestos)+"."
      ], sd));
    }
  }
  if(d.haCuidado){
    frases.push(pick([
      "He dedicado tiempo al cuidado de mi familia, una labor que me ha hecho "+g("responsable, organizada y muy capaz de resolver","responsable, organizado y muy capaz de resolver")+".",
      "Durante un tiempo me he ocupado del cuidado de mi familia, lo que me ha enseñado a organizarme y a no rendirme ante las dificultades.",
      "Cuidar de mi familia me ha convertido en una persona constante, paciente y resolutiva."
    ], sd+1));
  }
  if(f.length){
    frases.push(pick([
      "Se me da bien "+listar(f.slice(0,3))+".",
      "Destaco por "+listar(f.slice(0,3))+".",
      "Lo que mejor se me da es "+listar(f.slice(0,3))+"."
    ], sd+2));
  }
  frases.push(pick([
    "Soy una persona comprometida y con muchas ganas de trabajar y de seguir aprendiendo.",
    "Busco un trabajo donde poder aportar mi esfuerzo y mis ganas de crecer.",
    "Soy "+g("trabajadora, de confianza","trabajador, de confianza")+" y con muchas ganas de incorporarme a un nuevo equipo."
  ], sd+3));
  return frases.join(" ");
}
function titularAuto(){
  const d=estado.d;
  if(d.trabajos[0] && d.trabajos[0].puesto) return mayus(d.trabajos[0].puesto.toLowerCase());
  if(d.haCuidado) return g("Cuidadora con experiencia","Cuidador con experiencia");
  if(d.fortalezas[0]) return d.fortalezas[0];
  return "En búsqueda de empleo";
}
function textoCuidado(){
  const d=estado.d, sd=semilla();
  let quien=d.cuidadoQuien.trim();
  if(quien && !/^de\b/i.test(quien)) quien="de "+quien.toLowerCase(); else quien=quien.toLowerCase();
  let p=pick([
    "Me dediqué al cuidado "+(quien||"de mi familia"),
    "Durante un tiempo me ocupé del cuidado "+(quien||"de mi familia"),
    "He sido la persona encargada del cuidado "+(quien||"de mi familia")
  ], sd);
  if(d.cuidadoAnios) p+=" durante "+d.cuidadoAnios.toLowerCase();
  p+=". ";
  p+=pick([
    "Me encargaba de su día a día, de su bienestar y de coordinar todo lo necesario.",
    "Estaba pendiente de todo lo que necesitaba en el día a día.",
    "Asumí su cuidado completo y la organización de su día a día."
  ], sd+1);
  if(d.cuidadoComp.length){
    p+=" "+pick(["Así desarrollé capacidades como ","En este tiempo aprendí a manejar ","Esta experiencia me dio fortalezas como "], sd+2)+listar(d.cuidadoComp.map(c=>c.toLowerCase()))+".";
  }
  return p;
}
function tareaRedactada(t){ return frasePunto(t.tareas); }
function vistaCV(){
  const d=estado.d;
  const trabajos=d.trabajos.filter(t=>t.puesto||t.tareas);
  const estudios=d.estudios.filter(e=>e.titulo);
  const idiomas=d.idiomas.filter(x=>x.idioma);
  const tieneContacto=d.tel||d.email||d.ciudad;
  return `
  <div class="no-print" style="display:flex;gap:11px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;">
    <button class="btn btn-sec" id="editar" style="flex:none;padding:14px 22px;font-size:16px;">← Cambiar algo</button>
    <button class="btn btn-oro" id="imprimir" style="flex:none;padding:14px 22px;font-size:16px;">Guardar mi currículum</button>
  </div>
  <div class="cv">
    <aside>
      <div class="acc"></div>
      ${tieneContacto?`<div class="sec"><h3>Contacto</h3>
        ${d.tel?`<div class="linea">📞 ${esc(d.tel)}</div>`:""}
        ${d.email?`<div class="linea">✉ ${esc(d.email)}</div>`:""}
        ${d.ciudad?`<div class="linea">📍 ${esc(d.ciudad)}</div>`:""}</div>`:""}
      ${d.fortalezas.length?`<div class="sec"><h3>Lo que se me da bien</h3>${d.fortalezas.map(c=>`<div class="linea">• ${esc(c)}</div>`).join("")}</div>`:""}
      ${d.cuidadoComp.length?`<div class="sec"><h3>Del cuidado aprendí</h3>${d.cuidadoComp.map(c=>`<div class="linea">• ${esc(c)}</div>`).join("")}</div>`:""}
      ${idiomas.length?`<div class="sec"><h3>Idiomas</h3>${idiomas.map(x=>`<div class="linea">${esc(x.idioma)}${x.nivel?" — "+esc(x.nivel.toLowerCase()):""}</div>`).join("")}</div>`:""}
    </aside>
    <main>
      <h1>${esc(d.nombre)||"Tu nombre"}</h1>
      <div class="tit">${esc(titularAuto())}</div>
      <div class="sm"><h2>Sobre mí</h2><p class="perfil">${esc(redactarPerfil())}</p></div>
      ${trabajos.length?`<div class="sm"><h2>Experiencia</h2>${trabajos.map(t=>`
        <div class="exp">
          <div class="fila"><span class="puesto">${esc(mayus((t.puesto||"Trabajo").toLowerCase()))}</span><span class="fecha">${esc(t.fechas)}</span></div>
          ${t.empresa?`<div class="empresa">${esc(t.empresa)}</div>`:""}
          ${t.tareas?`<p class="tareas">${esc(tareaRedactada(t))}</p>`:""}
        </div>`).join("")}</div>`:""}
      ${d.haCuidado?`<div class="sm"><h2>Experiencia cuidando</h2><p class="perfil">${esc(textoCuidado())}</p></div>`:""}
      ${estudios.length?`<div class="sm"><h2>Formación</h2>${estudios.map(e=>`
        <div class="exp">
          <div class="fila"><span class="puesto" style="font-size:14.5px">${esc(mayus(e.titulo))}</span>${e.anio?`<span class="fecha">${esc(e.anio)}</span>`:""}</div>
          ${e.centro?`<div class="empresa" style="font-style:normal">${esc(e.centro)}</div>`:""}
        </div>`).join("")}</div>`:""}
    </main>
  </div>
  <div class="guia-guardar no-print">
    <h4>¿Cómo guardo mi currículum en el móvil?</h4>
    <ol>
      <li>Pulsa el botón dorado <b>"Guardar mi currículum"</b>.</li>
      <li>En la pantalla que aparece, busca <b>"Guardar como PDF"</b> y tócalo.</li>
      <li>Pulsa <b>Guardar</b>. ¡Ya está en tu móvil para enviarlo!</li>
    </ol>
  </div>`;
}
function enlazar(){
  const d=estado.d, p=estado.paso;
  document.querySelectorAll("[data-k]").forEach(el=>el.addEventListener("input",e=>{ d[e.target.dataset.k]=e.target.value; }));
  document.querySelectorAll("[data-arr]").forEach(el=>el.addEventListener("input",e=>{ const{arr,i,f}=e.target.dataset; d[arr][i][f]=e.target.value; }));
  document.querySelectorAll("[data-gen]").forEach(el=>el.addEventListener("click",e=>{ estado.d.genero=e.currentTarget.dataset.gen; render(); }));
  document.querySelectorAll("[data-uni]").forEach(el=>el.addEventListener("click",e=>{ const b=e.currentTarget; d[b.dataset.uni]= b.dataset.val==="true"; render(); }));
  document.querySelectorAll("[data-chip]").forEach(el=>el.addEventListener("click",e=>{ const{chip,val}=e.currentTarget.dataset; const a=d[chip]; d[chip]=a.includes(val)?a.filter(x=>x!==val):[...a,val]; render(); }));
  document.querySelectorAll("[data-idi]").forEach(el=>el.addEventListener("click",e=>{ const b=e.currentTarget; d.idiomas[b.dataset.idi].nivel=b.dataset.val; render(); }));
  document.querySelectorAll("[data-add]").forEach(el=>el.addEventListener("click",e=>{
    const k=e.currentTarget.dataset.add;
    if(k==="trabajos") d.trabajos.push({puesto:"",empresa:"",fechas:"",tareas:""});
    if(k==="estudios") d.estudios.push({titulo:"",centro:"",anio:""});
    if(k==="idiomas") d.idiomas.push({idioma:"",nivel:""});
    render();
  }));
  document.querySelectorAll("[data-del]").forEach(el=>el.addEventListener("click",e=>{ const{del,i}=e.currentTarget.dataset; d[del].splice(i,1); render(); }));
  const addFort=document.getElementById("addFort");
  if(addFort) addFort.addEventListener("click",()=>{ const inp=document.getElementById("nuevaFort"); const v=inp.value.trim(); if(v){d.fortalezas.push(v); render();} });
  const nf=document.getElementById("nuevaFort");
  if(nf) nf.addEventListener("keydown",e=>{ if(e.key==="Enter"){const v=e.target.value.trim(); if(v){d.fortalezas.push(v); render();}} });
  const saltar=document.getElementById("saltar");
  if(saltar) saltar.addEventListener("click",()=>{ estado.paso++; render(); });
  const atras=document.getElementById("atras");
  if(atras) atras.addEventListener("click",()=>{ if(p>0){estado.paso--; render();} });
  const sig=document.getElementById("siguiente");
  if(sig) sig.addEventListener("click",()=>{ estado.paso++; render(); });
  const editar=document.getElementById("editar");
  if(editar) editar.addEventListener("click",()=>{ estado.paso=0; render(); });
  const imp=document.getElementById("imprimir");
  if(imp) imp.addEventListener("click",()=>window.print());
}
render();
</script>
</body>
</html>
